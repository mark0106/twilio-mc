<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Contact Lists · SMS Campaigns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header></header>
    <main class="wide">
      <div class="toolbar">
        <h2>Contact Lists</h2>
        <a class="button" href="/contacts-new.html">New list</a>
      </div>

      <div id="loading" class="muted">Loading…</div>

      <table class="lists hidden" id="lists-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Count</th>
            <th>Created</th>
            <th class="right">Actions</th>
          </tr>
        </thead>
        <tbody id="lists-body"></tbody>
      </table>

      <div class="empty hidden" id="empty">
        <p>No contact lists yet.</p>
        <a class="button" href="/contacts-new.html">Upload your first CSV</a>
      </div>
    </main>
    <script type="module" src="/js/pages/contacts.js"></script>
  </body>
</html>
