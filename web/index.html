<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SMS Campaigns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>SMS Campaigns</h1>
      <nav>
        <a href="/login.html">Log in</a>
        <a href="/signup.html">Sign up</a>
      </nav>
    </header>
    <main>
      <h2>Welcome</h2>
      <p class="muted">
        Twilio SMS marketing campaigns. Bring your own Twilio Account SID and
        Auth Token, and send through your own Messaging Services.
      </p>
      <p><a class="link" href="/signup.html">Create an account</a> or <a class="link" href="/login.html">log in</a>.</p>
    </main>
    <script type="module">
      import { onAuthReady } from '/js/auth.js';
      onAuthReady().then((user) => {
        if (user) window.location.href = '/settings.html';
      });
    </script>
  </body>
</html>
