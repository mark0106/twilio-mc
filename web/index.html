<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>InvestPub SMS Campaigns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
  </head>
  <body>
    <main class="auth-card">
      <img class="auth-logo" src="/images/logo.png" alt="InvestPub" />
      <h2>SMS Campaigns</h2>
      <p class="muted">
        Send Twilio SMS marketing campaigns through your own Messaging Services.
        Bring your own Account SID and Auth Token.
      </p>
      <div style="display:flex; gap:10px; justify-content:center; margin-top: 24px;">
        <a class="button" href="/signup.html">Create an account</a>
        <a class="button secondary" href="/login.html">Log in</a>
      </div>
    </main>
    <script type="module">
      import { onAuthReady } from '/js/auth.js';
      onAuthReady().then((user) => {
        if (user) window.location.href = '/contacts.html';
      });
    </script>
  </body>
</html>
