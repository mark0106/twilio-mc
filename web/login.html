<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Log in · SMS Campaigns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>SMS Campaigns</h1>
      <nav><a href="/signup.html">Sign up</a></nav>
    </header>
    <main>
      <h2>Log in</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" />
        <button class="primary" type="submit" id="submit">Log in</button>
      </form>
      <div id="error" class="error hidden"></div>
      <p class="muted" style="margin-top: 20px;">No account yet? <a class="link" href="/signup.html">Sign up</a></p>
    </main>
    <script type="module" src="/js/pages/login.js"></script>
  </body>
</html>
