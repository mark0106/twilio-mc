<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Log in · InvestPub SMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
  </head>
  <body>
    <main class="auth-card">
      <a href="/"><img class="auth-logo" src="/images/logo.png" alt="InvestPub" /></a>
      <h2>Log in</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" />
        <button class="primary" type="submit" id="submit">Log in</button>
      </form>
      <div id="error" class="error hidden"></div>
      <p class="muted" style="margin-top: 20px;">No account yet? <a class="link" href="/signup.html">Sign up</a></p>
    </main>
    <script type="module" src="/js/pages/login.js"></script>
  </body>
</html>
