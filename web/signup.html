<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sign up · SMS Campaigns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>SMS Campaigns</h1>
      <nav><a href="/login.html">Log in</a></nav>
    </header>
    <main>
      <h2>Create your account</h2>
      <form id="signup-form">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
        <label for="password">Password</label>
        <input id="password" type="password" required minlength="6" autocomplete="new-password" />
        <button class="primary" type="submit" id="submit">Create account</button>
      </form>
      <div id="error" class="error hidden"></div>
      <p class="muted" style="margin-top: 20px;">Already have one? <a class="link" href="/login.html">Log in</a></p>
    </main>
    <script type="module" src="/js/pages/signup.js"></script>
  </body>
</html>
